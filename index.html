    .th{padding:11px 13px 8px;display:flex;justify-content:space-between;align-items:flex-start}
    .tsub{font-size:10px;color:#555570;margin-top:3px}
    .bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0D0B1E;border-top:1px solid #1E1A3E;padding:8px 16px;text-align:center;font-size:10px;color:#444460}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A2E;border:1px solid #2A2A4E;border-radius:8px;padding:8px 18px;font-size:12px;color:#A78BFA;z-index:999;white-space:nowrap}
    .empty{text-align:center;padding:28px;color:#555570}

    .conf-bar-fill{height:100%;border-radius:3px;transition:width .5s}

        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:`Trading assistant for ${OWNER}. Call get_option_quotes. Return ONLY JSON: {"instrument_id": mark_price}`,
          messages:[{role:"user",content:`Quotes for: ${JSON.stringify(ids)}`}],
          mcp_servers:[{type:"url",url:"https://agent.robinhood.com/mcp/trading",name:"RoopeshRoobhinhood"}]})});
      const data=await res.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.match(/\{[\s\S]*?\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        const np={};Object.entries(parsed).forEach(([id,price])=>{const tid=idMap[id];if(tid)np[tid]=parseFloat(price);});
        setPrices(np);
        const today=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        const snap={date:today,ts:Date.now(),prices:{...np}};
        const nh=[...history.filter(h=>h.date!==today),snap];
        setHistory(nh);await saveAll(nh,journal,algorithms);
        setLastUpdated(new Date().toLocaleTimeString());showToast("🔄 Prices updated");
      }
    }catch{showToast("⚠️ Fetch error");}
    setLoading(false);
  },[history,journal,algorithms]);

  function getPct(t){
    if(t.status==="closed")return t.closePnl??null;
    const c=prices[t.id];return c?((c-t.entry)/t.entry)*100:null;
  }

  // Graduation criteria — computed from real data
  const closedWins=TRADES.filter(t=>t.status==="closed"&&(t.closePnl||0)>=40);
  const daysTracked=history.length;
  const journalCount=journal.length;
  const verifiedAlgos=algorithms.filter(a=>a.verified).length;
  const noStopsHit=TRADES.filter(t=>t.status==="open").every(t=>{
    const p=getPct(t);return p===null||p>STOP*100;
  });

  const gradItems=[
    {label:"2 paper trades hit +40% target",done:closedWins.length>=2,detail:`${closedWins.length}/2 — ${closedWins.map(t=>t.symbol+" "+( t.closePnl>0?"+":"")+t.closePnl+"%").join(", ")||"none yet"}`},
    {label:"5+ journal entries logged",done:journalCount>=5,detail:`${journalCount} entries logged`},
    {label:"3+ days of price history",done:daysTracked>=3,detail:`${daysTracked} days tracked`},
    {label:"3+ algorithms verified HIGH confidence",done:verifiedAlgos>=3,detail:`${verifiedAlgos} verified — ${algorithms.filter(a=>a.verified).map(a=>a.name.split("—")[0].trim()).join(", ")||"none"}`},
    {label:"No open stop losses triggered",done:noStopsHit,detail:noStopsHit?"All open positions within range":"⚠️ Check open positions"},
  ];
  const gradDone=gradItems.filter(g=>g.done).length;
  const graduated=gradDone===gradItems.length;

  const openTrades=TRADES.filter(t=>t.status==="open");
  const closedTrades=TRADES.filter(t=>t.status==="closed");

  // Pattern data
  const optionAlgos=algorithms.filter(a=>["P001","P002","P003","P004","P005","P006"].some(p=>a.name.startsWith(p)));
  const stockAlgos=algorithms.filter(a=>["S001","S002","S003","S004","S005","S006"].some(p=>a.name.startsWith(p)));
  const cryptoAlgos=algorithms.filter(a=>["C001","C002","C003","C004","C005"].some(p=>a.name.startsWith(p)));
  const patternGroups={options:optionAlgos,stocks:stockAlgos,crypto:cryptoAlgos};

  if(selAlgo){
    const a=selAlgo;
    const cc=CC[a.confidence]||"#A78BFA";
    const cw=CW[a.confidence]||50;
    const jEntries=journal.filter(j=>a.stocks&&a.stocks.split(",").some(s=>j.stock.trim()===s.trim()));
    return(
      <div className="app">
        <div className="header" style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <button onClick={()=>setSelAlgo(null)} style={{background:"#1A0A3E",border:"1px solid #4A2C8A",borderRadius:6,color:"#A78BFA",padding:"4px 10px",fontSize:12,cursor:"pointer",flexShrink:0,marginTop:4}}>← Back</button>
          <div>
            <div className="badge">🔒 Pattern Detail</div>
            <div style={{fontSize:15,fontWeight:700,lineHeight:1.3}}>{a.name}</div>
          </div>
        </div>
        <div className="sec">
          {/* Confidence */}
          <div className="card" style={{padding:14,borderLeft:`3px solid ${cc}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700,color:cc}}>{a.confidence.toUpperCase()} CONFIDENCE</span>
              <span className="pill" style={{background:cc+"22",color:cc,borderColor:cc+"55",fontSize:10}}>
                {a.verified?"✅ Verified":a.confidence==="High"?"🔍 Review to verify":"🟡 Developing"}
              </span>
            </div>
            <div className="conf-bar-bg"><div className="conf-bar-fill" style={{width:`${cw}%`,background:cc}}/></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555570",marginBottom:10}}>
              <span>LOW</span><span>MEDIUM</span><span>HIGH</span>
            </div>
            <div style={{display:"flex",gap:20}}>
              <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#2ECC71"}}>{a.successCount||0}</div><div style={{fontSize:9,color:"#555570"}}>WINS</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:700,color:"#E74C3C"}}>{a.failCount||0}</div><div style={{fontSize:9,color:"#555570"}}>LOSSES</div></div>
              <div style={{flex:1,fontSize:11,color:"#888",paddingLeft:12,borderLeft:"1px solid #1E1A3E",display:"flex",alignItems:"center"}}>
                {(a.successCount||0)+(a.failCount||0)>0?`Win rate: ${Math.round((a.successCount||0)/((a.successCount||0)+(a.failCount||0))*100)}%`:"No trades yet"}
              </div>
            </div>
          </div>

          {/* Trigger + Action */}
          <div className="card" style={{padding:14}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>⚡ When This Pattern Fires</div>
            <div style={{fontSize:12,color:"#C8C8D8",lineHeight:1.7,marginBottom:12,paddingBottom:12,borderBottom:"1px solid #1E1A3E"}}>{a.condition}</div>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>🎯 What To Do</div>
            <div style={{background:"#0A0A18",border:"1px solid #1E1A3E",borderRadius:8,padding:10}}>
              <div style={{fontSize:12,color:"#A78BFA",lineHeight:1.7}}>{a.action}</div>
            </div>
          </div>

          {/* Applicable stocks */}
          {a.stocks&&<div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>📊 Applicable Stocks</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {a.stocks.split(",").map((s,i)=>(
                <span key={i} className="pill" style={{background:"#1A1A2E",color:"#A78BFA",borderColor:"#2A2A4E",fontSize:11,padding:"3px 10px"}}>{s.trim()}</span>
              ))}
            </div>
          </div>}

          {/* Journal entries for this pattern */}
          {jEntries.length>0&&<div className="card" style={{padding:14}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>📓 Journal Evidence</div>
            {jEntries.map((e,i)=>(
              <div key={i} className="ev-step">
                <div className="ev-dot" style={{background:e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12"}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:"#555570"}}>{e.date}</div>
                  <div style={{fontSize:11,color:"#C8C8D8",marginTop:2}}>{e.newsEvent}</div>
                  {e.premiumMove&&<div style={{fontSize:10,color:"#A78BFA",marginTop:1}}>📈 {e.premiumMove}</div>}
                  <div style={{fontSize:10,color:"#888",marginTop:2,fontStyle:"italic"}}>💡 {e.lesson}</div>
                </div>
              </div>
            ))}
          </div>}

          {/* Verify button */}
          <button onClick={()=>{
            const updated=algorithms.map(x=>x.id===a.id?{...x,verified:!x.verified}:x);
            setAlgorithms(updated);setSelAlgo({...a,verified:!a.verified});
            saveAll(history,journal,updated);
            showToast(a.verified?"⬜ Unverified":"✅ Marked as verified!");
          }} style={{width:"100%",padding:"10px",border:`1px solid ${a.verified?"#2ECC71":"#555570"}`,borderRadius:8,background:a.verified?"#0A2010":"transparent",color:a.verified?"#2ECC71":"#888",fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:8}}>
            {a.verified?"✅ Verified — Tap to unverify":"⬜ Mark as Verified"}
          </button>
          <div style={{fontSize:10,color:"#555570",textAlign:"center"}}>Added {a.date} · © {OWNER}</div>
        </div>
        <div className="bottom">🔒 {OWNER} · Pattern Detail · {VERSION}</div>
      </div>
    );
  }

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}
      <div className="header">
        <div className="badge">🔒 Private · {OWNER} · {VERSION}</div>

        <div className="subtitle">17 proprietary patterns · Real + paper trades · Private journal</div>

      {/* Stats */}
      <div className="stats-bar">
        {[
          {l:"Open",v:openTrades.length,c:"#A78BFA"},
          {l:"Wins",v:closedWins.length,c:"#2ECC71"},
          {l:"Journal",v:journalCount,c:"#A78BFA"},
          {l:"Graduation",v:`${gradDone}/5`,c:graduated?"#2ECC71":"#F39C12"},

          <div key={i} className="stat"><div className="stat-val" style={{color:s.c}}>{s.v}</div><div className="stat-lbl">{s.l}</div></div>
        ))}
      </div>

      <div className="tab-bar">
        {TABS.map(t=><button key={t} className={`tab${tab===t?" on":""}`} onClick={()=>setTab(t)}>{TL[t]}</button>)}

      {/* Seed data banner */}
      {!seeded&&(

          <button onClick={seedData} style={{background:"#F39C12",border:"none",borderRadius:6,color:"#000",padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Load Data</button>
        </div>
      )}

      {/* TRADES TAB */}
      {tab==="trades"&&(
        <div className="sec">
          <button className="btn" onClick={fetchPrices} disabled={loading}>{loading?"⏳ Fetching...":"🔄 Refresh Live Prices"}</button>
          {lastUpdated&&<div style={{fontSize:10,color:"#555570",textAlign:"center",marginBottom:10}}>Updated {lastUpdated}</div>}

          <div style={{fontSize:10,color:"#555570",marginBottom:6,letterSpacing:".08em",textTransform:"uppercase"}}>Open Positions</div>
          {openTrades.map(trade=>{
            const pct=getPct(trade);const days=daysLeft(trade.expiryDate);
            return(
              <div key={trade.id} className="card" style={{borderLeft:`3px solid ${trade.color}`}}>
                <div className="th">
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                      <span>{trade.emoji}</span>
                      <span style={{fontSize:15,fontWeight:700}}>{trade.symbol}</span>
                      <span className="pill" style={{background:trade.color+"22",color:trade.color,borderColor:trade.color+"44"}}>{trade.contract}</span>
                      {trade.type==="real"&&<span className="pill" style={{background:"#F39C1222",color:"#F39C12",borderColor:"#F39C1244"}}>💰 REAL</span>}
                    </div>
                    <div className="tsub">{trade.direction==="call"?"🟢 Bull":"🔴 Bear"} · {trade.sector} · {trade.expiry}
                      {days<=3&&days>0&&<span style={{color:"#E74C3C",fontWeight:700}}> · ⚠️ {days}d left!</span>}
                    </div>
                  </div>
                  <div style={{fontSize:16,fontWeight:700,color:pnlColor(pct)}}>{pct!==null?`${pct>=0?"+":""}${pct.toFixed(1)}%`:"—"}</div>
                </div>
                <div className="g4">
                  {[{l:"Entry",v:`$${trade.entry.toFixed(2)}`},{l:"Now",v:prices[trade.id]?`$${prices[trade.id].toFixed(2)}`:"—"},{l:"Stop",v:`$${(trade.entry*(1+STOP)).toFixed(2)}`,c:"#E74C3C"},{l:"Target",v:`$${(trade.entry*(1+TARGET)).toFixed(2)}`,c:"#2ECC71"}].map((c,i)=>(
                    <div key={i} className="cell"><div className="cv" style={{color:c.c||"#E8E8F0"}}>{c.v}</div><div className="cl">{c.l}</div></div>
                  ))}
                </div>
                {pct!==null&&<div className="prog-wrap"><div className="prog-bar"><div className="prog-fill" style={{width:`${Math.min(100,Math.max(0,((pct+35)/75)*100))}%`,background:pct>=0?"#2ECC71":"#E74C3C"}}/></div><div className="prog-lbls"><span style={{color:"#E74C3C"}}>−35%</span><span>0%</span><span style={{color:"#2ECC71"}}>+40%</span></div></div>}
              </div>
            );
          })}

          <div style={{fontSize:10,color:"#555570",margin:"12px 0 6px",letterSpacing:".08em",textTransform:"uppercase"}}>Closed Positions</div>
          {closedTrades.map(trade=>(
            <div key={trade.id} style={{background:"#0D0B1E",border:`1px solid ${(trade.closePnl||0)>0?"#2ECC7122":"#E74C3C22"}`,borderLeft:`3px solid ${(trade.closePnl||0)>0?"#2ECC71":"#E74C3C"}`,borderRadius:10,padding:"10px 13px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                  <span>{trade.emoji}</span>
                  <span style={{fontSize:13,fontWeight:600}}>{trade.symbol}</span>
                  <span style={{fontSize:10,color:"#555570"}}>{trade.contract}</span>
                </div>
                <div style={{fontSize:10,color:"#555570"}}>{trade.sector} · Entry ${trade.entry.toFixed(2)}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:16,fontWeight:700,color:(trade.closePnl||0)>0?"#2ECC71":"#E74C3C"}}>{(trade.closePnl||0)>=0?"+":""}{trade.closePnl?.toFixed(1)}%</div>
                <div style={{fontSize:10,color:"#555570"}}>{(trade.closePnl||0)>0?"✅ WIN":"❌ LOSS"}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* GRADUATION TAB */}
      {tab==="graduation"&&(
        <div className="sec">
          {graduated?(
            <div style={{background:"linear-gradient(135deg,#0A2010,#051005)",border:"1px solid #2ECC71",borderRadius:12,padding:20,textAlign:"center",marginBottom:12}}>
              <div style={{fontSize:40,marginBottom:8}}>🎓</div>
              <div style={{fontSize:18,fontWeight:700,color:"#2ECC71",marginBottom:4}}>Graduation Complete!</div>
              <div style={{fontSize:12,color:"#69F0AE"}}>You are cleared to trade real options using verified patterns</div>
            </div>
          ):(
            <div style={{background:"#0D0B1E",border:"1px solid #1E1A3E",borderRadius:12,padding:14,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div style={{fontSize:14,fontWeight:600,color:"#E8E8F0"}}>🎓 Progress to Real Money</div>
                <div style={{fontSize:13,fontWeight:700,color:gradDone>=4?"#2ECC71":"#F39C12"}}>{gradDone}/5</div>
              </div>
              <div className="conf-bar-bg" style={{marginBottom:4}}><div className="conf-bar-fill" style={{width:`${(gradDone/5)*100}%`,background:gradDone===5?"#2ECC71":"#F39C12"}}/></div>
              <div style={{fontSize:10,color:"#555570",textAlign:"right"}}>{Math.round((gradDone/5)*100)}% complete</div>
            </div>
          )}

          {gradItems.map((g,i)=>(
            <div key={i} className="grad-row">
              <span style={{fontSize:18}}>{g.done?"✅":"⬜"}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:g.done?"#E8E8F0":"#666",fontWeight:g.done?500:400}}>{g.label}</div>
                <div style={{fontSize:10,color:g.done?"#2ECC71":"#555570",marginTop:2}}>{g.detail}</div>
              </div>
            </div>
          ))}

          <div style={{background:"#0A0520",border:"1px solid #2D1B69",borderRadius:10,padding:12,marginTop:12}}>
            <div style={{fontSize:10,color:"#A78BFA",marginBottom:4,fontWeight:600}}>🛡️ Safety Rules Still Apply</div>
            {["Max 10% of trading pool per trade","Stop loss at −35% — always","Take profit at +40% — always","GTC orders only — never GFD","Only trade verified HIGH confidence patterns"].map((r,i)=>(
              <div key={i} style={{fontSize:10,color:"#666",padding:"3px 0"}}>• {r}</div>
            ))}
          </div>
        </div>
      )}

      {/* PATTERNS TAB */}
      {tab==="patterns"&&(
        <div className="sec">
          <div style={{fontSize:11,color:"#555570",marginBottom:10,textAlign:"center"}}>Tap any pattern for full detail + evidence trail</div>
          <div className="asset-tabs">
            {["options","stocks","crypto"].map(a=>(
              <button key={a} className={`asset-tab${assetTab===a?" on":""}`} onClick={()=>setAssetTab(a)}>
                {a==="options"?"🎯 Options":a==="stocks"?"📈 Stocks":"💎 Crypto"}
              </button>
            ))}
          </div>
          {(patternGroups[assetTab]||[]).map((a,i)=>{
            const cc=CC[a.confidence]||"#A78BFA";
            const cw=CW[a.confidence]||50;
            return(
              <div key={i} className="card" style={{borderLeft:`3px solid ${cc}`,cursor:"pointer"}} onClick={()=>setSelAlgo(a)}>
                <div style={{padding:"12px 13px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <span style={{fontSize:12,fontWeight:600,color:cc,flex:1,paddingRight:8}}>{a.name}</span>
                    <span className="pill" style={{background:cc+"22",color:cc,borderColor:cc+"55",fontSize:9,flexShrink:0}}>
                      {a.verified?"✅ Verified":a.confidence==="High"?"🔍 Unverified":a.confidence==="Medium"?"🟡 Developing":"🔴 Caution"}
                    </span>
                  </div>
                  <div className="conf-bar-bg" style={{marginBottom:6}}><div className="conf-bar-fill" style={{width:`${cw}%`,background:cc}}/></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#555570"}}>
                    <span>{a.successCount||0}W / {a.failCount||0}L · {a.stocks?.split(",")[0].trim()}</span>
                    <span>Tap to explore →</span>
                  </div>
                </div>
              </div>
            );
          })}
          {(patternGroups[assetTab]||[]).length===0&&(
            <div className="empty"><div style={{fontSize:28,marginBottom:8}}>🧠</div><div style={{fontSize:13}}>Tap "Load Data" banner to populate patterns</div></div>
          )}
        </div>
      )}

      {/* JOURNAL TAB */}
      {tab==="journal"&&(
        <div className="sec">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{journalCount} entries · Private to {OWNER}</div>
            <button className="sm-btn" onClick={()=>setShowJ(!showJ)}>{showJ?"✕ Cancel":"+ Log Entry"}</button>
          </div>
          {showJ&&(
            <div className="card" style={{padding:14,marginBottom:12,border:"1px solid #4A2C8A"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#A78BFA",marginBottom:10}}>📓 New Journal Entry</div>
              <label>Stock / Symbol</label>
              <select value={newJ.stock} onChange={e=>setNewJ({...newJ,stock:e.target.value})}>
                {["GLD","SMR","SPCX","TSLA","SQQQ","HOOD","NIO","BTC","ETH","SOL","FRO","AAPL"].map(s=><option key={s}>{s}</option>)}
              </select>
              <label>News Event</label>
              <input value={newJ.newsEvent} onChange={e=>setNewJ({...newJ,newsEvent:e.target.value})} placeholder="What news drove the move?"/>
              <label>Premium / Price Move</label>
              <input value={newJ.premiumMove} onChange={e=>setNewJ({...newJ,premiumMove:e.target.value})} placeholder="e.g. +29% in one day"/>
              <label>Direction Correct?</label>
              <select value={newJ.directionRight} onChange={e=>setNewJ({...newJ,directionRight:e.target.value})}>

              {e.premiumMove&&<div style={{fontSize:11,color:"#A78BFA",marginBottom:3}}>📈 {e.premiumMove}</div>}
              <div style={{fontSize:11,color:"#C8C8D8",fontStyle:"italic",marginBottom:6}}>💡 {e.lesson}</div>
              <span className="pill" style={{background:(e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12")+"22",color:e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12",fontSize:10}}>
                {e.directionRight==="yes"?"✅ Right direction":e.directionRight==="no"?"❌ Wrong direction":"⚠️ Partial"}
              </span>
            </div>
          ))}
        </div>
      )}

      {/* ALGORITHMS TAB */}
      {tab==="algorithms"&&(
        <div className="sec">
          <div style={{background:"#0A0520",border:"1px solid #2D1B69",borderRadius:10,padding:12,marginBottom:12}}>
            <div style={{fontSize:10,color:"#A78BFA",letterSpacing:".08em",textTransform:"uppercase",marginBottom:3}}>© Intellectual Property</div>
            <div style={{fontSize:13,fontWeight:700}}>{OWNER}</div>
            <div style={{fontSize:10,color:"#555570",marginTop:2}}>17 proprietary trading algorithms · Private · Not for public distribution</div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{algorithms.length} algorithms · {algorithms.filter(a=>a.verified).length} verified</div>
            <button className="sm-btn" onClick={()=>setShowA(!showA)}>{showA?"✕ Cancel":"+ New Algorithm"}</button>
          </div>
          {showA&&(
            <div className="card" style={{padding:14,marginBottom:12,border:"1px solid #4A2C8A"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#A78BFA",marginBottom:10}}>⚗️ New Algorithm</div>
              <label>Name</label><input value={newA.name} onChange={e=>setNewA({...newA,name:e.target.value})} placeholder="e.g. P007 — My New Pattern"/>
              <label>Trigger Condition</label><input value={newA.condition} onChange={e=>setNewA({...newA,condition:e.target.value})} placeholder="When does this fire?"/>
              <label>Action</label><input value={newA.action} onChange={e=>setNewA({...newA,action:e.target.value})} placeholder="What to do when triggered?"/>
              <label>Stocks</label><input value={newA.stocks} onChange={e=>setNewA({...newA,stocks:e.target.value})} placeholder="e.g. GLD, FRO"/>
              <label>Confidence</label>
              <select value={newA.confidence} onChange={e=>setNewA({...newA,confidence:e.target.value})}>
                <option value="High">High — proven pattern</option><option value="Medium">Medium — developing</option><option value="Low">Low — needs data</option>
              </select>
              <button className="btn" onClick={()=>{
                if(!newA.name||!newA.condition){showToast("⚠️ Fill name and condition");return;}
                const a={...newA,id:Date.now(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),owner:OWNER,verified:false,successCount:0,failCount:0};
                const na=[...algorithms,a];setAlgorithms(na);setShowA(false);
                setNewA({name:"",condition:"",action:"",confidence:"Medium",stocks:""});
                saveAll(history,journal,na);showToast("✅ Algorithm saved!");
              }}>⚗️ Save Algorithm</button>
            </div>
          )}
          {algorithms.length===0?(
            <div className="empty"><div style={{fontSize:28,marginBottom:8}}>⚗️</div><div>No algorithms yet</div><div style={{fontSize:11,marginTop:4}}>Tap "Load Data" banner above</div></div>
          ):algorithms.map((a,i)=>{
            const cc=CC[a.confidence]||"#A78BFA";
            return(
              <div key={i} className="card" style={{borderLeft:`3px solid ${a.verified?cc:"#333"}`,cursor:"pointer"}} onClick={()=>setSelAlgo(a)}>
                <div style={{padding:"11px 13px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                    <span style={{fontSize:11,fontWeight:600,color:a.verified?cc:"#888",flex:1,paddingRight:8}}>{a.name}</span>
                    <span className="pill" style={{background:(a.verified?cc:"#555")+"22",color:a.verified?cc:"#555",borderColor:(a.verified?cc:"#333")+"55",fontSize:9,flexShrink:0}}>
                      {a.verified?"✅ Verified":"⬜ Unverified"}
                    </span>
                  </div>
                  <div style={{fontSize:10,color:"#555570"}}>{a.confidence} · {a.successCount||0}W / {a.failCount||0}L · Tap to verify →</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div className="bottom">🔒 Private · {OWNER} · All data stored locally · {VERSION}</div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
