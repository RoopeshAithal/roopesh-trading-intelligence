<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roopesh Trading Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;background:#080810;color:#E8E8F0;min-height:100vh}
    .app{max-width:480px;margin:0 auto;padding-bottom:70px}
    .header{background:linear-gradient(135deg,#0D0B1E,#1A0A3E);padding:20px 18px 14px;border-bottom:1px solid #1E1A3E}
    .owner-badge{display:inline-flex;align-items:center;gap:5px;background:#1A0A3E;border:1px solid #4A2C8A;border-radius:20px;padding:3px 10px;font-size:10px;color:#A78BFA;margin-bottom:8px}
    .title{font-size:20px;font-weight:700;letter-spacing:-.5px}
    .subtitle{font-size:11px;color:#6B6B8A;margin-top:3px}
    .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1E1A3E}
    .stat{background:#0A0A0F;padding:10px 8px;text-align:center}
    .stat-val{font-size:17px;font-weight:700;color:#A78BFA}
    .stat-label{font-size:9px;color:#555570;margin-top:1px}
    .tab-bar{display:flex;background:#0D0B1E;border-bottom:1px solid #1E1A3E;overflow-x:auto}
    .tab{flex:0 0 auto;padding:9px 12px;background:none;border:none;border-bottom:2px solid transparent;color:#555570;font-size:11px;cursor:pointer;white-space:nowrap}
    .tab.active{color:#A78BFA;border-bottom-color:#7C3AED;font-weight:600}
    .section{padding:12px 16px}
    .card{background:#0D0B1E;border:1px solid #1E1A3E;border-radius:12px;margin-bottom:10px;overflow:hidden}
    .btn{background:linear-gradient(135deg,#7C3AED,#4F46E5);border:none;border-radius:8px;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px}
    .btn:disabled{opacity:0.6;cursor:not-allowed}
    .pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1E1A3E;margin:0 13px 10px;border-radius:6px;overflow:hidden}
    .cell{background:#0D0B1E;padding:7px 4px;text-align:center}
    .cell-val{font-size:12px;font-weight:600}
    .cell-label{font-size:9px;color:#555570}
    .progress-wrap{padding:0 13px 10px}
    .progress-bar{height:3px;background:#1E1A3E;border-radius:2px;overflow:hidden}
    .progress-fill{height:100%;border-radius:2px;transition:width .4s}
    .progress-labels{display:flex;justify-content:space-between;margin-top:2px;font-size:8px;color:#555570}
    .trade-header{padding:11px 13px 8px;display:flex;justify-content:space-between;align-items:flex-start}
    .trade-name{font-size:15px;font-weight:700;margin:0 4px}
    .trade-sub{font-size:10px;color:#555570;margin-top:3px}
    .exit-row{padding:0 13px 10px;display:flex;gap:8px}
    .exit-box{flex:1;border-radius:6px;padding:6px 8px}
    .exit-label{font-size:9px;margin-bottom:2px}
    .exit-val{font-size:12px;font-weight:600}
    .stop-box{background:#1A0A0A;border:1px solid #3D1515}
    .target-box{background:#0A1A0A;border:1px solid #153D15}
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0D0B1E;border-top:1px solid #1E1A3E;padding:8px 16px;text-align:center;font-size:10px;color:#444460}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A2E;border:1px solid #2A2A4E;border-radius:8px;padding:8px 18px;font-size:12px;color:#A78BFA;z-index:999;white-space:nowrap}
    .empty{text-align:center;padding:30px;color:#555570}
    .empty-icon{font-size:28px;margin-bottom:8px}
    .journal-form{background:#0D0B1E;border:1px solid #4A2C8A;border-radius:12px;padding:14px;margin-bottom:12px}
    .form-title{font-size:12px;font-weight:600;color:#A78BFA;margin-bottom:10px}
    .form-label{font-size:11px;color:#6B6B8A;margin-bottom:4px;display:block}
    .form-input{background:#080810;border:1px solid #2A2A4A;border-radius:8px;color:#E8E8F0;padding:9px 12px;font-size:13px;width:100%;margin-bottom:8px}
    .form-input:focus{outline:none;border-color:#7C3AED}
    .form-select{background:#080810;border:1px solid #2A2A4A;border-radius:8px;color:#E8E8F0;padding:9px 12px;font-size:13px;width:100%;margin-bottom:8px}
    .btn-small{background:#1A0A3E;border:1px solid #4A2C8A;border-radius:6px;color:#A78BFA;padding:5px 10px;font-size:11px;cursor:pointer}
    .btn-green{background:linear-gradient(135deg,#27AE60,#1A8A4A);border:none;border-radius:8px;color:#fff;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
    .ip-box{background:#0A0520;border:1px solid #2D1B69;border-radius:10px;padding:12px;margin-bottom:12px}
    .section-label{font-size:10px;color:#555570;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase}
    .algo-card{background:#0D0B1E;border:1px solid #1E1A3E;border-left:3px solid #7C3AED;border-radius:10px;padding:12px;margin-bottom:8px}
    .verify-btn{background:transparent;border:1px solid #333;border-radius:5px;color:#555570;padding:3px 8px;font-size:10px;cursor:pointer}
    .verify-btn.verified{background:#0A2010;border-color:#2ECC71;color:#2ECC71}
    .history-card{background:#0D0B1E;border:1px solid #1E1A3E;border-radius:10px;margin-bottom:10px;padding:12px}
    .history-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
    .history-cell{background:#13132A;border-radius:6px;padding:6px 8px;text-align:center}
    .grad-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #1E1A3E}
    .grad-item:last-child{border-bottom:none}
    select option{background:#0D0B1E}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const OWNER = "Roopesh Aithal";
const VERSION = "v1.0";

const TRADES = [
  {id:"aapl",symbol:"AAPL",contract:"$295 Call",expiry:"Jul 2, 2026",expiryDate:"2026-07-02",direction:"call",entry:4.73,instrumentId:"00a93029-f53b-4ce3-b039-7a479be23a2b",type:"paper",emoji:"🍎",color:"#4A90D9",sector:"Tech"},
  {id:"tsla",symbol:"TSLA",contract:"$390 Call",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"call",entry:25.00,instrumentId:null,type:"paper",emoji:"⚡",color:"#E03F3F",sector:"EV"},
  {id:"spcx",symbol:"SPCX",contract:"$157.5 Put",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"put",entry:8.50,instrumentId:null,type:"paper",emoji:"🚀",color:"#9B59B6",sector:"Space"},
  {id:"fro",symbol:"FRO",contract:"$43 Call",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"call",entry:2.13,instrumentId:"f5eb426f-ce9f-418e-a8ca-117ba55e8aa6",type:"paper",emoji:"🛢️",color:"#27AE60",sector:"Energy"},
  {id:"sqqq",symbol:"SQQQ",contract:"$40 Call Jul17",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"call",entry:3.13,instrumentId:"65d56e64-9670-42ca-9a85-6de967d0f575",type:"paper",emoji:"📉",color:"#F39C12",sector:"Inverse ETF"},
  {id:"gld",symbol:"GLD",contract:"$375 Put",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"put",entry:7.75,instrumentId:"b3b26a93-2030-4591-8fbc-19e1437fc862",type:"paper",emoji:"🥇",color:"#F1C40F",sector:"Commodities"},
  {id:"smr",symbol:"SMR",contract:"$10 Call",expiry:"Jul 17, 2026",expiryDate:"2026-07-17",direction:"call",entry:1.55,instrumentId:"fdee6570-7e4d-44ba-9efd-31f9109a8757",type:"paper",emoji:"⚛️",color:"#1ABC9C",sector:"Nuclear"},
];

const STOP=-0.35, TARGET=0.40;
const PATTERN_TYPES={NEWS_DRIVEN:"📰 News-Driven",DIVIDEND:"💰 Dividend",POST_IPO:"🚀 Post-IPO Fade",EARNINGS:"📊 Earnings",MACRO:"🌍 Macro",TECHNICAL:"📈 Technical",SECTOR:"🏭 Sector",WRONG_DIRECTION:"🔄 Direction Flip"};
const TABS=["trades","history","patterns","journal","algorithms"];
const TAB_LABELS={trades:"📊 Trades",history:"📅 History",patterns:"🧠 Patterns",journal:"📓 Journal",algorithms:"⚗️ Algorithms"};

const pnlColor=(p)=>p===null?"#666":p>=TARGET*100?"#2ECC71":p<=STOP*100?"#E74C3C":p>0?"#58D68D":"#EC7063";
const daysLeft=(d)=>Math.ceil((new Date(d)-new Date())/86400000);

function App(){
  const[tab,setTab]=useState("trades");
  const[prices,setPrices]=useState({});
  const[history,setHistory]=useState([]);
  const[patterns,setPatterns]=useState([]);
  const[journal,setJournal]=useState([]);
  const[algorithms,setAlgorithms]=useState([]);
  const[loading,setLoading]=useState(false);
  const[lastUpdated,setLastUpdated]=useState(null);
  const[toast,setToast]=useState("");
  const[newEntry,setNewEntry]=useState({stock:"AAPL",newsEvent:"",premiumMove:"",directionRight:"yes",lesson:"",patternType:"NEWS_DRIVEN"});
  const[newAlgo,setNewAlgo]=useState({name:"",condition:"",action:"",confidence:"Low",stocks:""});
  const[showJForm,setShowJForm]=useState(false);
  const[showAForm,setShowAForm]=useState(false);

  useEffect(()=>{loadAll();},[]);

  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500)};

  async function loadAll(){
    try{
      const r=await window.storage.get("ra-v2");
      if(r?.value){const d=JSON.parse(r.value);setHistory(d.history||[]);setPatterns(d.patterns||[]);setJournal(d.journal||[]);setAlgorithms(d.algorithms||[]);}
    }catch{}
  }

  async function saveAll(h,p,j,a){
    try{await window.storage.set("ra-v2",JSON.stringify({history:h,patterns:p,journal:j,algorithms:a}),false);showToast("✅ Saved privately");}
    catch{showToast("⚠️ Save failed");}
  }

  const fetchPrices=useCallback(async()=>{
    setLoading(true);
    const liveIds=TRADES.filter(t=>t.instrumentId).map(t=>t.instrumentId);
    const idMap={};TRADES.filter(t=>t.instrumentId).forEach(t=>{idMap[t.instrumentId]=t.id;});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:`Trading assistant for ${OWNER}. Call get_option_quotes. Return ONLY JSON: {"instrument_id": mark_price}`,
          messages:[{role:"user",content:`Get quotes JSON only: ${JSON.stringify(liveIds)}`}],
          mcp_servers:[{type:"url",url:"https://agent.robinhood.com/mcp/trading",name:"RoopeshRoobhinhood"}]})});
      const data=await res.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.match(/\{[\s\S]*\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        const np={};Object.entries(parsed).forEach(([id,price])=>{const tid=idMap[id];if(tid)np[tid]=parseFloat(price);});
        setPrices(np);
        const today=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        const snap={date:today,ts:Date.now(),prices:{...np}};
        const nh=[...history.filter(h=>h.date!==today),snap];
        const dp=detectPatterns(nh,journal);
        setHistory(nh);setPatterns(dp);
        await saveAll(nh,dp,journal,algorithms);
        setLastUpdated(new Date().toLocaleTimeString());
        showToast("🔄 Live prices updated");
      }
    }catch{showToast("⚠️ Fetch error");}
    setLoading(false);
  },[history,journal,algorithms]);

  function detectPatterns(hist,jrnl){
    const found=[];
    jrnl.forEach(e=>{
      if(e.directionRight==="yes"&&e.patternType==="NEWS_DRIVEN"){
        const ex=found.find(f=>f.algo==="NEWS_DRIVEN"&&f.stock===e.stock);
        if(ex){ex.count++;ex.confidence=ex.count>=2?"High":"Medium";}
        else found.push({algo:"NEWS_DRIVEN",stock:e.stock,label:PATTERN_TYPES.NEWS_DRIVEN,detail:`News catalyst correct on ${e.stock}`,confidence:"Low",count:1,color:"#3498DB",date:e.date});
      }
      if(e.patternType==="POST_IPO"&&e.directionRight==="yes")
        found.push({algo:"POST_IPO",stock:e.stock,label:PATTERN_TYPES.POST_IPO,detail:`Post-IPO fade put profitable on ${e.stock}`,confidence:"Medium",count:1,color:"#9B59B6",date:e.date});
    });
    TRADES.forEach(trade=>{
      const pts=hist.map(h=>h.prices[trade.id]).filter(p=>p!==undefined);
      if(pts.length>=3){
        const l=pts.slice(-3);
        if(l[2]>l[1]&&l[1]>l[0])found.push({algo:"TREND_UP",stock:trade.symbol,label:"📈 3-Day Uptrend",detail:`${trade.symbol} rising 3 days`,confidence:"Medium",count:1,color:"#2ECC71",date:new Date().toLocaleDateString()});
        if(l[2]<l[1]&&l[1]<l[0])found.push({algo:"TREND_DOWN",stock:trade.symbol,label:"📉 3-Day Downtrend",detail:`${trade.symbol} falling — consider exit`,confidence:"High",count:1,color:"#E74C3C",date:new Date().toLocaleDateString()});
      }
      const cur=hist[hist.length-1]?.prices[trade.id];
      if(cur){
        const pct=((cur-trade.entry)/trade.entry)*100;
        if(pct>=TARGET*100)found.push({algo:"TAKE_PROFIT",stock:trade.symbol,label:"🏆 Take Profit Hit",detail:`${trade.symbol} hit +40% → EXIT NOW`,confidence:"High",count:1,color:"#F1C40F",date:new Date().toLocaleDateString()});
        if(pct<=STOP*100)found.push({algo:"STOP_LOSS",stock:trade.symbol,label:"🛑 Stop Loss Hit",detail:`${trade.symbol} hit −35% → EXIT NOW`,confidence:"High",count:1,color:"#E74C3C",date:new Date().toLocaleDateString()});
      }
    });
    return found;
  }

  function addJournalEntry(){
    if(!newEntry.newsEvent||!newEntry.lesson){showToast("⚠️ Fill news event and lesson");return;}
    const e={...newEntry,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),id:Date.now()};
    const nj=[e,...journal];const np=detectPatterns(history,nj);
    setJournal(nj);setPatterns(np);
    setNewEntry({stock:"AAPL",newsEvent:"",premiumMove:"",directionRight:"yes",lesson:"",patternType:"NEWS_DRIVEN"});
    setShowJForm(false);saveAll(history,np,nj,algorithms);
  }

  function addAlgo(){
    if(!newAlgo.name||!newAlgo.condition){showToast("⚠️ Fill name and condition");return;}
    const a={...newAlgo,id:Date.now(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),owner:OWNER,verified:false};
    const na=[a,...algorithms];setAlgorithms(na);
    setNewAlgo({name:"",condition:"",action:"",confidence:"Low",stocks:""});
    setShowAForm(false);saveAll(history,patterns,journal,na);
  }

  function getPct(t){const c=prices[t.id];return c?((c-t.entry)/t.entry)*100:null;}
  const gradReady=patterns.filter(p=>p.algo==="TAKE_PROFIT").length>=2;

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}

      <div className="header">
        <div className="owner-badge">🔒 Private · {OWNER} · {VERSION}</div>
        <div className="title">⚗️ Trading Intelligence</div>
        <div className="subtitle">Pattern algorithms · Live tracker · Private journal</div>
      </div>

      <div className="stats-bar">
        {[{l:"Trades",v:TRADES.length},{l:"Patterns",v:patterns.length},{l:"Journal",v:journal.length},{l:"Algorithms",v:algorithms.length}].map((s,i)=>(
          <div key={i} className="stat"><div className="stat-val">{s.v}</div><div className="stat-label">{s.l}</div></div>
        ))}
      </div>

      <div className="tab-bar">
        {TABS.map(t=><button key={t} className={`tab${tab===t?" active":""}`} onClick={()=>setTab(t)}>{TAB_LABELS[t]}</button>)}
      </div>

      {tab==="trades"&&(
        <div className="section">
          <button className="btn" onClick={fetchPrices} disabled={loading}>{loading?"⏳ Fetching...":"🔄 Refresh Live Prices"}</button>
          {lastUpdated&&<div style={{fontSize:10,color:"#555570",textAlign:"center",marginBottom:10}}>Updated {lastUpdated}</div>}
          {TRADES.map(trade=>{
            const cur=prices[trade.id];const pct=getPct(trade);const days=daysLeft(trade.expiryDate);
            return(
              <div key={trade.id} className="card" style={{borderLeft:`3px solid ${trade.color}`}}>
                <div className="trade-header">
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                      <span>{trade.emoji}</span>
                      <span className="trade-name">{trade.symbol}</span>
                      <span className="pill" style={{background:trade.color+"22",color:trade.color,border:`1px solid ${trade.color}44`}}>{trade.contract}</span>
                      {trade.type==="real"&&<span className="pill" style={{background:"#F39C1222",color:"#F39C12",border:"1px solid #F39C1244"}}>💰 REAL</span>}
                    </div>
                    <div className="trade-sub">
                      {trade.direction==="call"?"🟢 Bull":"🔴 Bear"} · {trade.sector} · {trade.expiry}
                      {days<=3&&<span style={{color:"#E74C3C",fontWeight:700}}> · ⚠️ {days}d!</span>}
                    </div>
                  </div>
                  <div style={{fontSize:16,fontWeight:700,color:pnlColor(pct)}}>{pct!==null?`${pct>=0?"+":""}${pct.toFixed(1)}%`:"—"}</div>
                </div>
                <div className="grid4">
                  {[{l:"Entry",v:`$${trade.entry.toFixed(2)}`},{l:"Now",v:cur?`$${cur.toFixed(2)}`:"—"},{l:"Stop",v:`$${(trade.entry*(1+STOP)).toFixed(2)}`,c:"#E74C3C"},{l:"Target",v:`$${(trade.entry*(1+TARGET)).toFixed(2)}`,c:"#2ECC71"}].map((c,i)=>(
                    <div key={i} className="cell"><div className="cell-val" style={{color:c.c||"#E8E8F0"}}>{c.v}</div><div className="cell-label">{c.l}</div></div>
                  ))}
                </div>
                <div className="exit-row">
                  <div className="exit-box stop-box"><div className="exit-label" style={{color:"#E74C3C"}}>🛑 STOP (−35%)</div><div className="exit-val" style={{color:"#E74C3C"}}>${(trade.entry*(1+STOP)).toFixed(2)}</div></div>
                  <div className="exit-box target-box"><div className="exit-label" style={{color:"#2ECC71"}}>✅ TARGET (+40%)</div><div className="exit-val" style={{color:"#2ECC71"}}>${(trade.entry*(1+TARGET)).toFixed(2)}</div></div>
                </div>
                {pct!==null&&(
                  <div className="progress-wrap">
                    <div className="progress-bar"><div className="progress-fill" style={{width:`${Math.min(100,Math.max(0,((pct+35)/75)*100))}%`,background:pct>=0?"#2ECC71":"#E74C3C"}}/></div>
                    <div className="progress-labels"><span style={{color:"#E74C3C"}}>−35%</span><span>0%</span><span style={{color:"#2ECC71"}}>+40%</span></div>
                  </div>
                )}
              </div>
            );
          })}
          {gradReady&&<div style={{background:"#0A2010",border:"1px solid #1A5030",borderRadius:10,padding:14,textAlign:"center"}}><div style={{fontSize:20,marginBottom:4}}>🎓</div><div style={{fontSize:13,fontWeight:700,color:"#2ECC71"}}>Ready for Real Money!</div></div>}
        </div>
      )}

      {tab==="history"&&(
        <div className="section">
          {history.length===0?<div className="empty"><div className="empty-icon">📅</div><div>No history yet</div><div style={{fontSize:11,marginTop:4}}>Refresh prices to start tracking</div></div>
          :[...history].reverse().map((snap,i)=>(
            <div key={i} className="history-card">
              <div style={{fontSize:11,fontWeight:600,color:"#A78BFA"}}>📅 {snap.date}</div>
              <div className="history-grid">
                {TRADES.map(trade=>{
                  const p=snap.prices[trade.id];const pct=p?((p-trade.entry)/trade.entry)*100:null;
                  return(<div key={trade.id} className="history-cell"><div style={{fontSize:10,color:"#555570"}}>{trade.emoji} {trade.symbol}</div><div style={{fontSize:12,fontWeight:600,color:pnlColor(pct),marginTop:2}}>{pct!==null?`${pct>=0?"+":""}${pct.toFixed(1)}%`:"—"}</div></div>);
                })}
              </div>
            </div>
          ))}
        </div>
      )}

      {tab==="patterns"&&(
        <div className="section">
          <div className="card" style={{padding:14,marginBottom:12,borderColor:"#2D1B69"}}>
            <div style={{fontSize:12,fontWeight:600,color:"#A78BFA",marginBottom:10}}>🎓 Graduation Checklist</div>
            {[{l:"2 paper trades hit +40%",done:patterns.filter(p=>p.algo==="TAKE_PROFIT").length>=2},{l:"3+ days of price history",done:history.length>=3},{l:"5+ journal entries",done:journal.length>=5},{l:"2+ algorithms verified",done:algorithms.filter(a=>a.verified).length>=2},{l:"No stop losses hit",done:!patterns.some(p=>p.algo==="STOP_LOSS")}].map((c,i)=>(
              <div key={i} className="grad-item"><span>{c.done?"✅":"⬜"}</span><span style={{fontSize:11,color:c.done?"#2ECC71":"#555570"}}>{c.l}</span></div>
            ))}
          </div>
          {patterns.length===0?<div className="empty"><div className="empty-icon">🧠</div><div>Patterns emerge after 3+ days + journal entries</div></div>
          :patterns.map((p,i)=>(
            <div key={i} style={{background:"#0D0B1E",border:`1px solid #1E1A3E`,borderLeft:`3px solid ${p.color}`,borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:12,fontWeight:600,color:p.color}}>{p.label}</span>
                <span className="pill" style={{background:(p.confidence==="High"?"#2ECC71":p.confidence==="Medium"?"#F39C12":"#666")+"22",color:p.confidence==="High"?"#2ECC71":p.confidence==="Medium"?"#F39C12":"#666",border:"1px solid #33333344"}}>{p.confidence}</span>
              </div>
              <div style={{fontSize:10,color:"#555570",marginTop:3}}>{p.stock} · {p.detail}</div>
            </div>
          ))}
        </div>
      )}

      {tab==="journal"&&(
        <div className="section">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{journal.length} entries · Private</div>
            <button className="btn-small" onClick={()=>setShowJForm(!showJForm)}>{showJForm?"✕ Cancel":"+ Log Entry"}</button>
          </div>
          {showJForm&&(
            <div className="journal-form">
              <div className="form-title">📓 New Entry</div>
              <label className="form-label">Stock</label>
              <select className="form-select" value={newEntry.stock} onChange={e=>setNewEntry({...newEntry,stock:e.target.value})}>
                {TRADES.map(t=><option key={t.id} value={t.symbol}>{t.emoji} {t.symbol}</option>)}
              </select>
              <label className="form-label">Pattern Type</label>
              <select className="form-select" value={newEntry.patternType} onChange={e=>setNewEntry({...newEntry,patternType:e.target.value})}>
                {Object.entries(PATTERN_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>
              <label className="form-label">News Event</label>
              <input className="form-input" value={newEntry.newsEvent} onChange={e=>setNewEntry({...newEntry,newsEvent:e.target.value})} placeholder="e.g. Record Q1 profit + dividend"/>
              <label className="form-label">Premium Move</label>
              <input className="form-input" value={newEntry.premiumMove} onChange={e=>setNewEntry({...newEntry,premiumMove:e.target.value})} placeholder="e.g. +29% in one day"/>
              <label className="form-label">Direction Correct?</label>
              <select className="form-select" value={newEntry.directionRight} onChange={e=>setNewEntry({...newEntry,directionRight:e.target.value})}>
                <option value="yes">✅ Yes</option><option value="no">❌ No</option><option value="partial">⚠️ Partial</option>
              </select>
              <label className="form-label">Lesson Learned</label>
              <input className="form-input" value={newEntry.lesson} onChange={e=>setNewEntry({...newEntry,lesson:e.target.value})} placeholder="e.g. Fundamentals beat macro short-term"/>
              <button className="btn-green" onClick={addJournalEntry}>💾 Save Entry</button>
            </div>
          )}
          {journal.length===0?<div className="empty"><div className="empty-icon">📓</div><div>No entries yet</div></div>
          :journal.map((e,i)=>(
            <div key={i} style={{background:"#0D0B1E",border:"1px solid #1E1A3E",borderLeft:`3px solid ${e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12"}`,borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:11,fontWeight:600}}>{TRADES.find(t=>t.symbol===e.stock)?.emoji} {e.stock}</span>
                <span style={{fontSize:10,color:"#555570"}}>{e.date}</span>
              </div>
              <div style={{fontSize:10,color:"#A78BFA",marginBottom:3}}>{PATTERN_TYPES[e.patternType]}</div>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>📰 {e.newsEvent}</div>
              {e.premiumMove&&<div style={{fontSize:11,color:"#888",marginBottom:3}}>📈 {e.premiumMove}</div>}
              <div style={{fontSize:11,color:"#E8E8F0",fontStyle:"italic",marginBottom:5}}>💡 {e.lesson}</div>
              <span className="pill" style={{background:(e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12")+"22",color:e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12",border:"1px solid #33333344"}}>
                {e.directionRight==="yes"?"✅ Right":e.directionRight==="no"?"❌ Wrong":"⚠️ Partial"}
              </span>
            </div>
          ))}
        </div>
      )}

      {tab==="algorithms"&&(
        <div className="section">
          <div className="ip-box">
            <div style={{fontSize:10,color:"#A78BFA",marginBottom:3,letterSpacing:".08em",textTransform:"uppercase"}}>Intellectual Property</div>
            <div style={{fontSize:13,fontWeight:700}}>© {OWNER}</div>
            <div style={{fontSize:10,color:"#555570",marginTop:2}}>All trading pattern algorithms are private IP of {OWNER}. Not for public use.</div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{algorithms.length} custom algorithms</div>
            <button className="btn-small" onClick={()=>setShowAForm(!showAForm)}>{showAForm?"✕ Cancel":"+ New Algorithm"}</button>
          </div>
          {showAForm&&(
            <div className="journal-form">
              <div className="form-title">⚗️ Define Algorithm</div>
              <label className="form-label">Algorithm Name</label>
              <input className="form-input" value={newAlgo.name} onChange={e=>setNewAlgo({...newAlgo,name:e.target.value})} placeholder="e.g. Dividend Support Bull Call"/>
              <label className="form-label">Condition (When to trigger)</label>
              <input className="form-input" value={newAlgo.condition} onChange={e=>setNewAlgo({...newAlgo,condition:e.target.value})} placeholder="e.g. Company announces dividend + record profits"/>
              <label className="form-label">Action (What to do)</label>
              <input className="form-input" value={newAlgo.action} onChange={e=>setNewAlgo({...newAlgo,action:e.target.value})} placeholder="e.g. Buy ATM Call, 3-4 weeks expiry"/>
              <label className="form-label">Applicable Stocks</label>
              <input className="form-input" value={newAlgo.stocks} onChange={e=>setNewAlgo({...newAlgo,stocks:e.target.value})} placeholder="e.g. FRO, any dividend stock"/>
              <label className="form-label">Confidence</label>
              <select className="form-select" value={newAlgo.confidence} onChange={e=>setNewAlgo({...newAlgo,confidence:e.target.value})}>
                <option value="Low">Low — needs more data</option>
                <option value="Medium">Medium — seen 2-3 times</option>
                <option value="High">High — proven pattern</option>
              </select>
              <button className="btn" onClick={addAlgo}>⚗️ Save Algorithm</button>
            </div>
          )}
          {algorithms.length===0?<div className="empty"><div className="empty-icon">⚗️</div><div>No algorithms yet</div><div style={{fontSize:11,marginTop:4}}>Add journal entries or define one above</div></div>
          :algorithms.map((a,i)=>(
            <div key={i} className="algo-card">
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,fontWeight:700,color:"#A78BFA"}}>⚗️ {a.name}</span>
                <span className="pill" style={{background:(a.confidence==="High"?"#2ECC71":a.confidence==="Medium"?"#F39C12":"#666")+"22",color:a.confidence==="High"?"#2ECC71":a.confidence==="Medium"?"#F39C12":"#666",border:"1px solid #33333344"}}>{a.confidence}</span>
              </div>
              <div style={{fontSize:10,color:"#888",marginBottom:3}}><span style={{color:"#555570"}}>WHEN: </span>{a.condition}</div>
              <div style={{fontSize:10,color:"#888",marginBottom:3}}><span style={{color:"#555570"}}>DO: </span>{a.action}</div>
              {a.stocks&&<div style={{fontSize:10,color:"#888",marginBottom:4}}><span style={{color:"#555570"}}>STOCKS: </span>{a.stocks}</div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:9,color:"#444460"}}>{a.date}</span>
                <button className={`verify-btn${a.verified?" verified":""}`} onClick={()=>{
                  const ua=algorithms.map((x,j)=>j===i?{...x,verified:!x.verified}:x);
                  setAlgorithms(ua);saveAll(history,patterns,journal,ua);
                }}>{a.verified?"✅ Verified":"⬜ Mark Verified"}</button>
              </div>
            </div>
          ))}
        </div>
      )}

      <div className="bottom-bar">🔒 Private · {OWNER} · Data stored locally · Not shared</div>
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
