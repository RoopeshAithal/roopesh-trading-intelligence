  const[toast,setToast]=useState("");
  const[assetTab,setAssetTab]=useState("options");
  const[selPattern,setSelPattern]=useState(null);
  const[showJ,setShowJ]=useState(false);
  const[showA,setShowA]=useState(false);
  const[newJ,setNewJ]=useState({stock:"SMR",newsEvent:"",premiumMove:"",directionRight:"yes",lesson:""});
  const[newA,setNewA]=useState({name:"",condition:"",action:"",confidence:"Medium",stocks:""});

  useEffect(()=>{loadAll();},[]);
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};

  async function loadAll(){
    try{const r=await window.storage.get("ra-v3");if(r?.value){const d=JSON.parse(r.value);setHistory(d.history||[]);setJournal(d.journal||[]);setAlgorithms(d.algorithms||[]);}}catch{}
  }
  async function saveAll(h,j,a){
    try{await window.storage.set("ra-v3",JSON.stringify({history:h,journal:j,algorithms:a}),false);showToast("✅ Saved");}catch{showToast("⚠️ Save failed");}
  }

  const fetchPrices=useCallback(async()=>{
    setLoading(true);
    const liveIds=TRADES.filter(t=>t.instrumentId).map(t=>t.instrumentId);
    const idMap={};TRADES.filter(t=>t.instrumentId).forEach(t=>{idMap[t.instrumentId]=t.id;});
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
          system:`Trading assistant for ${OWNER}. Call get_option_quotes. Return ONLY JSON mapping instrument_id to mark_price.`,
          messages:[{role:"user",content:`Quotes JSON only: ${JSON.stringify(liveIds)}`}],
          mcp_servers:[{type:"url",url:"https://agent.robinhood.com/mcp/trading",name:"RoopeshRoobhinhood"}]})});
      const data=await res.json();
      const text=data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const match=text.match(/\{[\s\S]*\}/);
      if(match){
        const parsed=JSON.parse(match[0]);
        const np={};Object.entries(parsed).forEach(([id,price])=>{const tid=idMap[id];if(tid)np[tid]=parseFloat(price);});
        setPrices(np);
        const today=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
        const snap={date:today,ts:Date.now(),prices:{...np}};
        const nh=[...history.filter(h=>h.date!==today),snap];
        setHistory(nh);await saveAll(nh,journal,algorithms);
        setLastUpdated(new Date().toLocaleTimeString());showToast("🔄 Updated");
      }
    }catch{showToast("⚠️ Error");}
    setLoading(false);
  },[history,journal,algorithms]);

  function getPct(t){
    if(t.status==="closed")return t.closePnl||null;
    const c=prices[t.id];return c?((c-t.entry)/t.entry)*100:null;
  }

  const wins=TRADES.filter(t=>t.closePnl>0).length;
  const losses=TRADES.filter(t=>t.closePnl<0).length;
  const openCount=TRADES.filter(t=>t.status==="open").length;
  const allPatterns=[...PATTERNS.options,...PATTERNS.stocks,...PATTERNS.crypto];
  const highConf=allPatterns.filter(p=>p.confidence==="HIGH").length;

  if(selPattern){
    const p=selPattern;
    const cc=CONF_COLORS[p.confidence];
    return(
      <div className="app">
        <div className="header" style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setSelPattern(null)} style={{background:"#1A0A3E",border:"1px solid #4A2C8A",borderRadius:6,color:"#A78BFA",padding:"4px 10px",fontSize:12,cursor:"pointer"}}>← Back</button>
          <div>
            <div className="badge">🔒 Pattern Detail · {OWNER}</div>
            <div style={{fontSize:16,fontWeight:700}}>{p.id} — {p.name}</div>
          </div>
        </div>
        <div className="sec">
          {/* Confidence */}
          <div className="card" style={{padding:14,marginBottom:10,borderLeft:`3px solid ${cc}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:13,fontWeight:700,color:cc}}>{p.confidence} CONFIDENCE</span>
              <span className="verify-badge" style={{background:cc+"22",border:`1px solid ${cc}55`,color:cc}}>{p.confidence==="HIGH"?"✅ Verified":p.confidence==="MEDIUM"?"🟡 Developing":"🔴 Use Caution"}</span>
            </div>
            <div className="conf-bar-wrap">
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555570"}}>
                <span>Confidence Level</span><span>{CONF_WIDTH[p.confidence]}%</span>
              </div>
              <div className="conf-bar-bg"><div className="conf-bar-fill" style={{width:`${CONF_WIDTH[p.confidence]}%`,background:cc}}/></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555570",marginTop:2}}>
                <span>LOW</span><span>MEDIUM</span><span>HIGH</span>
              </div>
            </div>
            <div style={{display:"flex",gap:16,marginTop:10}}>
              <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#2ECC71"}}>{p.wins}</div><div style={{fontSize:9,color:"#555570"}}>WINS</div></div>
              <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:"#E74C3C"}}>{p.losses}</div><div style={{fontSize:9,color:"#555570"}}>LOSSES</div></div>
              <div style={{flex:1,fontSize:11,color:"#888",paddingLeft:8,borderLeft:"1px solid #1E1A3E"}}>Win rate: {p.wins+p.losses>0?Math.round(p.wins/(p.wins+p.losses)*100):"N/A"}%</div>
            </div>
          </div>

          {/* Why verified */}
          {p.why&&<div className="card" style={{padding:14,marginBottom:10}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}}>🧠 Why This Pattern Works</div>
            <div style={{fontSize:12,color:"#C8C8D8",lineHeight:1.7}}>{p.why}</div>
          </div>}

          {/* Triggers */}
          <div className="card" style={{padding:14,marginBottom:10}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>⚡ Entry Triggers (ALL must fire)</div>
            {p.triggers.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:i<p.triggers.length-1?"1px solid #1E1A3E":"none"}}>
                <span style={{fontSize:14}}>🔲</span>
                <span style={{fontSize:12,color:"#C8C8D8"}}>{t}</span>
              </div>
            ))}
            <div style={{marginTop:10,padding:10,background:"#0A0A18",borderRadius:8,border:"1px solid #1E1A3E"}}>
              <div style={{fontSize:9,color:"#6B6B8A",marginBottom:4}}>ACTION WHEN TRIGGERED</div>
              <div style={{fontSize:12,color:"#A78BFA"}}>{p.action}</div>
            </div>
          </div>

          {/* Evidence trail */}
          <div className="card" style={{padding:14,marginBottom:10}}>
            <div style={{fontSize:10,color:"#6B6B8A",textTransform:"uppercase",letterSpacing:".08em",marginBottom:8}}>📋 Evidence Trail — How It Got Verified</div>
            {p.evidence.map((e,i)=>(
              <div key={i} className="ev-step">
                <div className="ev-dot" style={{background:e.dot}}/>
                <div style={{flex:1}}>
                  <div className="ev-date">{e.date}</div>
                  <div className="ev-text">{e.text}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Result */}
          {p.result&&<div className="result-box">
            <div><div className="result-pct" style={{color:p.result.pct.startsWith("-")?"#E74C3C":p.result.pct.startsWith("+")?"#2ECC71":"#A78BFA"}}>{p.result.pct}</div><div className="result-detail">{p.result.detail}</div></div>
            <div style={{fontSize:28}}>{p.result.pct.startsWith("+")?"🏆":p.result.pct.includes("loss")||p.result.pct.startsWith("-")?"📚":"📊"}</div>
          </div>}

          {/* Next setup */}
          {p.nextSetup&&<div style={{background:"#0A1A0A",border:"1px solid #153D15",borderRadius:10,padding:12,marginTop:10}}>
            <div style={{fontSize:10,color:"#2ECC71",marginBottom:4,fontWeight:600}}>🎯 NEXT SETUP TO WATCH</div>
            <div style={{fontSize:12,color:"#C8C8D8"}}>{p.nextSetup}</div>
          </div>}
        </div>
        <div className="bottom">🔒 {OWNER} · Private Pattern Intelligence · {VERSION}</div>
      </div>
    );
  }

  return(
    <div className="app">
      {toast&&<div className="toast">{toast}</div>}
      <div className="header">
        <div className="badge">🔒 Private · {OWNER} · {VERSION}</div>
        <div className="title">⚗️ Trading Intelligence</div>
        <div className="subtitle">Pattern algorithms · Live tracker · 17 proprietary patterns</div>
      </div>
      <div className="stats-bar">
        {[{l:"Open",v:openCount},{l:"Wins",v:wins},{l:"Losses",v:losses},{l:"HIGH Patterns",v:highConf}].map((s,i)=>(
          <div key={i} className="stat"><div className="stat-val" style={{color:i===1?"#2ECC71":i===2?"#E74C3C":"#A78BFA"}}>{s.v}</div><div className="stat-lbl">{s.l}</div></div>
        ))}
      </div>
      <div className="tab-bar">
        {TABS.map(t=><button key={t} className={`tab${tab===t?" on":""}`} onClick={()=>setTab(t)}>{TLABELS[t]}</button>)}
      </div>

      {tab==="trades"&&(
        <div className="sec">
          <button className="btn" onClick={fetchPrices} disabled={loading}>{loading?"⏳ Fetching...":"🔄 Refresh Live Prices"}</button>
          {lastUpdated&&<div style={{fontSize:10,color:"#555570",textAlign:"center",marginBottom:10}}>Updated {lastUpdated}</div>}
          {/* Open trades */}
          <div style={{fontSize:10,color:"#555570",marginBottom:6,letterSpacing:".08em",textTransform:"uppercase"}}>Open Positions</div>
          {TRADES.filter(t=>t.status==="open").map(trade=>{
            const pct=getPct(trade);const days=daysLeft(trade.expiryDate);const urgent=days<=3;
            return(
              <div key={trade.id} className="card" style={{borderLeft:`3px solid ${trade.color}`}}>
                <div className="th">
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                      <span>{trade.emoji}</span><span style={{fontSize:15,fontWeight:700}}>{trade.symbol}</span>
                      <span className="pill" style={{background:trade.color+"22",color:trade.color,borderColor:trade.color+"44"}}>{trade.contract}</span>
                    </div>
                    <div className="tsub">{trade.direction==="call"?"🟢 Bull":"🔴 Bear"} · {trade.sector} · {trade.expiry}{urgent&&<span style={{color:"#E74C3C",fontWeight:700}}> · ⚠️ {days}d!</span>}</div>
                  </div>
                  <div style={{fontSize:16,fontWeight:700,color:pnlColor(pct)}}>{pct!==null?`${pct>=0?"+":""}${pct.toFixed(1)}%`:"—"}</div>
                </div>
                <div className="g4">
                  {[{l:"Entry",v:`$${trade.entry.toFixed(2)}`},{l:"Now",v:prices[trade.id]?`$${prices[trade.id].toFixed(2)}`:"—"},{l:"Stop",v:`$${(trade.entry*(1+STOP)).toFixed(2)}`,c:"#E74C3C"},{l:"Target",v:`$${(trade.entry*(1+TARGET)).toFixed(2)}`,c:"#2ECC71"}].map((c,i)=>(
                    <div key={i} className="cell"><div className="cv" style={{color:c.c||"#E8E8F0"}}>{c.v}</div><div className="cl">{c.l}</div></div>
                  ))}
                </div>
                {pct!==null&&<div className="prog-wrap"><div className="prog-bar"><div className="prog-fill" style={{width:`${Math.min(100,Math.max(0,((pct+35)/75)*100))}%`,background:pct>=0?"#2ECC71":"#E74C3C"}}/></div><div className="prog-lbls"><span style={{color:"#E74C3C"}}>−35%</span><span>0%</span><span style={{color:"#2ECC71"}}>+40%</span></div></div>}
              </div>
            );
          })}
          {/* Closed trades */}
          <div style={{fontSize:10,color:"#555570",margin:"12px 0 6px",letterSpacing:".08em",textTransform:"uppercase"}}>Closed Positions</div>
          {TRADES.filter(t=>t.status==="closed").map(trade=>{
            const pct=trade.closePnl;
            return(
              <div key={trade.id} style={{background:"#0D0B1E",border:`1px solid ${pct>0?"#2ECC7133":"#E74C3C33"}`,borderLeft:`3px solid ${pct>0?"#2ECC71":"#E74C3C"}`,borderRadius:10,padding:10,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span>{trade.emoji}</span><span style={{fontSize:13,fontWeight:600}}>{trade.symbol}</span>
                    <span style={{fontSize:10,color:"#555570"}}>{trade.contract}</span>
                  </div>
                  <div style={{fontSize:10,color:"#555570",marginTop:2}}>{trade.sector} · Entry ${trade.entry.toFixed(2)}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:16,fontWeight:700,color:pct>0?"#2ECC71":"#E74C3C"}}>{pct>0?"+":""}{pct?.toFixed(1)}%</div>
                  <div style={{fontSize:10,color:"#555570"}}>{pct>0?"✅ WIN":"❌ LOSS"}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab==="patterns"&&(
        <div className="sec">
          <div style={{fontSize:11,color:"#555570",marginBottom:10,textAlign:"center"}}>Tap any pattern to see full verification evidence</div>
          <div className="asset-tabs">
            {["options","stocks","crypto"].map(a=><button key={a} className={`asset-tab${assetTab===a?" on":""}`} onClick={()=>setAssetTab(a)}>{PLABELS[a]}</button>)}
          </div>
          {PATTERNS[assetTab].map(p=>{
            const cc=CONF_COLORS[p.confidence];
            return(
              <div key={p.id} className="card" style={{borderLeft:`3px solid ${cc}`,cursor:"pointer"}} onClick={()=>setSelPattern(p)}>
                <div style={{padding:"12px 13px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    <div>
                      <span style={{fontSize:10,color:"#555570"}}>{p.id} · </span>
                      <span style={{fontSize:13,fontWeight:600,color:cc}}>{p.name}</span>
                    </div>
                    <span className="verify-badge" style={{background:cc+"22",border:`1px solid ${cc}55`,color:cc,flexShrink:0}}>
                      {p.confidence==="HIGH"?"✅ Verified":p.confidence==="MEDIUM"?"🟡 Developing":"🔴 Caution"}
                    </span>
                  </div>
                  <div className="conf-bar-bg" style={{marginBottom:6}}><div className="conf-bar-fill" style={{width:`${CONF_WIDTH[p.confidence]}%`,background:cc}}/></div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontSize:11,color:"#888"}}>{p.result?.pct} · {p.result?.detail?.split("·")[0]}</div>
                    <div style={{fontSize:11,color:"#555570"}}>Tap to explore →</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab==="journal"&&(
        <div className="sec">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{journal.length} entries · Private to {OWNER}</div>
            <button className="sm-btn" onClick={()=>setShowJ(!showJ)}>{showJ?"✕":"+ Log"}</button>
          </div>
          {showJ&&(
            <div className="card" style={{padding:14,marginBottom:12,border:"1px solid #4A2C8A"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#A78BFA",marginBottom:10}}>📓 New Entry</div>
              <label>Stock / Symbol</label>
              <select value={newJ.stock} onChange={e=>setNewJ({...newJ,stock:e.target.value})}>
                {["SMR","SPCX","TSLA","GLD","SQQQ","HOOD","NIO","BTC","ETH","SOL"].map(s=><option key={s}>{s}</option>)}
              </select>
              <label>News Event</label>
              <input value={newJ.newsEvent} onChange={e=>setNewJ({...newJ,newsEvent:e.target.value})} placeholder="What news drove the move?"/>
              <label>Premium / Price Move</label>
              <input value={newJ.premiumMove} onChange={e=>setNewJ({...newJ,premiumMove:e.target.value})} placeholder="e.g. +29% in one day"/>
              <label>Direction Correct?</label>
              <select value={newJ.directionRight} onChange={e=>setNewJ({...newJ,directionRight:e.target.value})}>
                <option value="yes">✅ Yes</option><option value="no">❌ No</option><option value="partial">⚠️ Partial</option>
              </select>
              <label>Lesson Learned</label>
              <input value={newJ.lesson} onChange={e=>setNewJ({...newJ,lesson:e.target.value})} placeholder="What pattern does this confirm or refute?"/>
              <button className="green-btn" onClick={()=>{
                if(!newJ.newsEvent||!newJ.lesson){showToast("⚠️ Fill in news and lesson");return;}
                const e={...newJ,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),id:Date.now()};
                const nj=[e,...journal];setJournal(nj);setShowJ(false);
                setNewJ({stock:"SMR",newsEvent:"",premiumMove:"",directionRight:"yes",lesson:""});
                saveAll(history,nj,algorithms);
              }}>💾 Save Entry</button>
            </div>
          )}
          {journal.length===0?<div className="empty"><div className="fi">📓</div><div>No journal entries yet</div><div style={{fontSize:11,marginTop:4}}>Tap + Log to add your first entry</div></div>
          :journal.map((e,i)=>(
            <div key={i} style={{background:"#0D0B1E",border:"1px solid #1E1A3E",borderLeft:`3px solid ${e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12"}`,borderRadius:10,padding:12,marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:12,fontWeight:600}}>{e.stock}</span>
                <span style={{fontSize:10,color:"#555570"}}>{e.date}</span>
              </div>
              <div style={{fontSize:11,color:"#888",marginBottom:3}}>📰 {e.newsEvent}</div>
              {e.premiumMove&&<div style={{fontSize:11,color:"#888",marginBottom:3}}>📈 {e.premiumMove}</div>}
              <div style={{fontSize:11,color:"#C8C8D8",fontStyle:"italic",marginBottom:5}}>💡 {e.lesson}</div>
              <span className="pill" style={{background:(e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12")+"22",color:e.directionRight==="yes"?"#2ECC71":e.directionRight==="no"?"#E74C3C":"#F39C12",borderColor:"transparent"}}>
                {e.directionRight==="yes"?"✅ Right":e.directionRight==="no"?"❌ Wrong":"⚠️ Partial"}
              </span>
            </div>
          ))}
        </div>
      )}

      {tab==="algorithms"&&(
        <div className="sec">
          <div style={{background:"#0A0520",border:"1px solid #2D1B69",borderRadius:10,padding:12,marginBottom:12}}>
            <div style={{fontSize:10,color:"#A78BFA",letterSpacing:".08em",textTransform:"uppercase",marginBottom:3}}>Intellectual Property</div>
            <div style={{fontSize:13,fontWeight:700}}>© {OWNER}</div>
            <div style={{fontSize:10,color:"#555570",marginTop:2}}>17 proprietary trading algorithms · Private · Not for public use or distribution</div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:11,color:"#555570"}}>{algorithms.length} custom + {allPatterns.length} system algorithms</div>
            <button className="sm-btn" onClick={()=>setShowA(!showA)}>{showA?"✕":"+ New"}</button>
          </div>
          {showA&&(
            <div className="card" style={{padding:14,marginBottom:12,border:"1px solid #4A2C8A"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#A78BFA",marginBottom:10}}>⚗️ Define Algorithm</div>
              <label>Name</label><input value={newA.name} onChange={e=>setNewA({...newA,name:e.target.value})} placeholder="e.g. Dividend Support Bull Call"/>
              <label>Trigger Condition</label><input value={newA.condition} onChange={e=>setNewA({...newA,condition:e.target.value})} placeholder="When does this pattern fire?"/>
              <label>Action</label><input value={newA.action} onChange={e=>setNewA({...newA,action:e.target.value})} placeholder="What do you do when triggered?"/>
              <label>Applicable Stocks</label><input value={newA.stocks} onChange={e=>setNewA({...newA,stocks:e.target.value})} placeholder="e.g. FRO, any dividend stock"/>
              <label>Confidence</label>
              <select value={newA.confidence} onChange={e=>setNewA({...newA,confidence:e.target.value})}>
                <option value="High">High — proven pattern</option><option value="Medium">Medium — developing</option><option value="Low">Low — needs data</option>
              </select>
              <button className="btn" onClick={()=>{
                if(!newA.name||!newA.condition){showToast("⚠️ Fill name and condition");return;}
                const a={...newA,id:Date.now(),date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),owner:OWNER,verified:false};
                const na=[a,...algorithms];setAlgorithms(na);setShowA(false);
                setNewA({name:"",condition:"",action:"",confidence:"Medium",stocks:""});
                saveAll(history,journal,na);
              }}>⚗️ Save Algorithm</button>
            </div>
          )}
          {/* System patterns summary */}
          <div style={{fontSize:10,color:"#555570",marginBottom:6,letterSpacing:".08em",textTransform:"uppercase"}}>System Patterns (tap Patterns tab for details)</div>
          {allPatterns.map((p,i)=>{
            const cc=CONF_COLORS[p.confidence];
            return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #1E1A3E"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:6,height:6,borderRadius:"50%",background:cc,flexShrink:0}}/>
                  <span style={{fontSize:12,color:"#C8C8D8"}}>{p.id} · {p.name}</span>
                </div>
                <span className="pill" style={{background:cc+"22",color:cc,borderColor:cc+"44",fontSize:9}}>{p.confidence}</span>
              </div>
            );
          })}
          {/* Custom algorithms */}
          {algorithms.length>0&&<>
            <div style={{fontSize:10,color:"#555570",margin:"12px 0 6px",letterSpacing:".08em",textTransform:"uppercase"}}>Your Custom Algorithms</div>
            {algorithms.map((a,i)=>(
              <div key={i} style={{background:"#0D0B1E",border:"1px solid #1E1A3E",borderLeft:"3px solid #7C3AED",borderRadius:10,padding:12,marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#A78BFA"}}>⚗️ {a.name}</span>
                  <span className="pill" style={{background:"#A78BFA22",color:"#A78BFA",borderColor:"#A78BFA44",fontSize:9}}>{a.confidence}</span>
                </div>
                <div style={{fontSize:10,color:"#888"}}><span style={{color:"#555570"}}>WHEN: </span>{a.condition}</div>
                {a.action&&<div style={{fontSize:10,color:"#888",marginTop:2}}><span style={{color:"#555570"}}>DO: </span>{a.action}</div>}
                <div style={{fontSize:9,color:"#444460",marginTop:4}}>{a.date} · {OWNER}</div>
              </div>
            ))}
          </>}
        </div>
      )}
      <div className="bottom">🔒 Private · {OWNER} · All data stored locally · Not shared</div>
    </div>
  );
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
